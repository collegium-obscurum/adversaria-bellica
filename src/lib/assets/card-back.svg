<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="1480" viewBox="0 0 1050 1480">
	<defs>
		<radialGradient id="bg" cx="50%" cy="50%" r="75%">
			<stop offset="0%" stop-color="#6d2a15"/>
			<stop offset="55%" stop-color="#54200f"/>
			<stop offset="100%" stop-color="#3a150a"/>
		</radialGradient>
		<path id="arm" d="M525,740 C600,615 765,635 785,760 C800,855 730,935 630,940"
			fill="none" stroke="#a5813c" stroke-width="17" stroke-linecap="round"/>
		<path id="arm-faint" d="M525,740 C645,555 905,595 935,785 C958,935 848,1065 688,1072"
			fill="none" stroke="#b99b5f" stroke-width="9" stroke-linecap="round" opacity="0.22"/>
		<path id="corner" d="M0,110 C0,35 35,0 110,0 M0,72 C0,22 22,0 72,0"
			fill="none" stroke="#a5813c" stroke-width="7"/>
	</defs>

	<rect width="1050" height="1480" fill="url(#bg)"/>

	<!-- frame sits 5mm inside the edge: duplex offset stays invisible -->
	<rect x="50" y="50" width="950" height="1380" fill="none" stroke="#a5813c" stroke-width="10"/>
	<rect x="68" y="68" width="914" height="1344" fill="none" stroke="#b99b5f" stroke-width="4" opacity="0.8"/>

	<g transform="translate(92,92)"><use href="#corner"/></g>
	<g transform="translate(958,92) scale(-1,1)"><use href="#corner"/></g>
	<g transform="translate(92,1388) scale(1,-1)"><use href="#corner"/></g>
	<g transform="translate(958,1388) scale(-1,-1)"><use href="#corner"/></g>

	<use href="#arm-faint" transform="rotate(30,525,740)"/>
	<use href="#arm-faint" transform="rotate(90,525,740)"/>
	<use href="#arm-faint" transform="rotate(150,525,740)"/>
	<use href="#arm-faint" transform="rotate(210,525,740)"/>
	<use href="#arm-faint" transform="rotate(270,525,740)"/>
	<use href="#arm-faint" transform="rotate(330,525,740)"/>

	<circle cx="525" cy="740" r="362" fill="none" stroke="#b99b5f" stroke-width="5" opacity="0.6"/>
	<circle cx="525" cy="740" r="332" fill="none" stroke="#a5813c" stroke-width="10"/>

	<use href="#arm"/>
	<use href="#arm" transform="rotate(60,525,740)"/>
	<use href="#arm" transform="rotate(120,525,740)"/>
	<use href="#arm" transform="rotate(180,525,740)"/>
	<use href="#arm" transform="rotate(240,525,740)"/>
	<use href="#arm" transform="rotate(300,525,740)"/>

	<circle cx="525" cy="740" r="72" fill="#a5813c"/>
	<circle cx="525" cy="740" r="54" fill="#54200f"/>
	<circle cx="525" cy="740" r="30" fill="#f2e8d0"/>

	<circle cx="525" cy="160" r="12" fill="#a5813c"/>
	<circle cx="525" cy="1320" r="12" fill="#a5813c"/>
</svg>
